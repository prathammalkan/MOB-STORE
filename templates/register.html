{% extends "base.html" %}
{% block title %}MobStore | Register{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-card glass-card reveal">
        <span class="eyebrow">Create Account</span>
        <h1>Join MobStore</h1>
        <p>Create your customer account for cart, orders, invoices, and support.</p>
        <form method="POST" class="auth-form">
            <input type="text" name="name" placeholder="Full name" required>
            <input type="email" name="email" placeholder="Email address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button class="btn btn-dark" type="submit">Create account</button>
        </form>
        <p class="auth-switch">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</section>
{% endblock %}
